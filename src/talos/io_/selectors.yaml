# Selettori Amazon.it per scraping (ADR-0017 canale 2)
#
# Versione 1 — inaugurato CHG-2026-05-01-002.
#
# Convenzione (D2.a ratificata "default" Leader 2026-04-30 sera):
# per ogni campo, due liste ordinate. Si prova prima la `css`
# (rapida); se tutti i selettori falliscono, si prova la `xpath`.
# Il primo selettore che ritorna testo non vuoto vince.
#
# Quando Amazon cambia layout, aggiornare i selettori dell'inizio
# della lista. Tracciabilita': ogni mismatch viene loggato come
# evento canonico `scrape.selector_fail` (ADR-0021 dormiente,
# attivato in CHG-2026-05-01-005 integratore).

amazon_it:
  product_title:
    css:
      - "#productTitle"
      - "h1[data-feature-name='title']"
      - "h1#title span"
    xpath:
      - "//h1[@id='productTitle']"
      - "//*[@data-feature-name='title']//h1"

  buybox_price:
    css:
      - "#corePrice_feature_div .a-price .a-offscreen"
      - "#price_inside_buybox"
      - "[data-action='show-all-offers-display'] .a-price .a-offscreen"
      - "#priceblock_ourprice"
    xpath:
      - "//*[@id='corePrice_feature_div']//*[contains(@class, 'a-offscreen')]"
      - "//*[@id='price_inside_buybox']"
      - "//*[@id='priceblock_ourprice']"

  asin_marker:
    css:
      - "#ASIN[type='hidden']"
    xpath:
      - "//input[@id='ASIN']"

  # BSR (CHG-2026-05-01-013, validato live 2026-05-01 su B0CSTC2RDW
  # Samsung Galaxy S24): Amazon.it 2025 mostra TUTTI i rank (root +
  # sub-categoria) come lista `<li>` dentro la tabella
  # `table.a-keyvalue.prodDetTable`, riga "Posizione nella classifica
  # Bestseller di Amazon". Esempio inner_text del `<li>`:
  #   "n. 6.182 in Elettronica (Visualizza i Top 100 nella categoria Elettronica)"
  #   "n. 162 in Cellulari e Smartphone"
  # Una sola sezione `bsr_root` raccoglie entrambi: `parse_bsr_text`
  # ne estrae rank+categoria; il parentetico "(Visualizza Top 100)"
  # viene rimosso dalla regex. `bsr_sub` resta come fallback per
  # layout legacy `ul.zg_hrsr` (storicamente usato da pagine non-IT
  # o variant); CSS standard, no `:-soup-contains`.
  bsr_root:
    css:
      - "table.a-keyvalue.prodDetTable tr td ul.a-unordered-list li"
      - "table.prodDetTable tr td ul.a-unordered-list li"
      - "#productDetails_detailBullets_sections1 ul.a-unordered-list li"
    xpath: []

  bsr_sub:
    css:
      - "ul.zg_hrsr li"
      - "ul.a-unordered-list.zg_hrsr li"
    xpath: []
