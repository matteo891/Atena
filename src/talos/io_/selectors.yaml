# Selettori Amazon.it per scraping (ADR-0017 canale 2)
#
# Versione 1 — inaugurato CHG-2026-05-01-002.
#
# Convenzione (D2.a ratificata "default" Leader 2026-04-30 sera):
# per ogni campo, due liste ordinate. Si prova prima la `css`
# (rapida); se tutti i selettori falliscono, si prova la `xpath`.
# Il primo selettore che ritorna testo non vuoto vince.
#
# Quando Amazon cambia layout, aggiornare i selettori dell'inizio
# della lista. Tracciabilita': ogni mismatch viene loggato come
# evento canonico `scrape.selector_fail` (ADR-0021 dormiente,
# attivato in CHG-2026-05-01-005 integratore).

amazon_it:
  product_title:
    css:
      - "#productTitle"
      - "h1[data-feature-name='title']"
      - "h1#title span"
    xpath:
      - "//h1[@id='productTitle']"
      - "//*[@data-feature-name='title']//h1"

  buybox_price:
    css:
      - "#corePrice_feature_div .a-price .a-offscreen"
      - "#price_inside_buybox"
      - "[data-action='show-all-offers-display'] .a-price .a-offscreen"
      - "#priceblock_ourprice"
    xpath:
      - "//*[@id='corePrice_feature_div']//*[contains(@class, 'a-offscreen')]"
      - "//*[@id='price_inside_buybox']"
      - "//*[@id='priceblock_ourprice']"

  asin_marker:
    css:
      - "#ASIN[type='hidden']"
    xpath:
      - "//input[@id='ASIN']"

  # BSR root rank (CHG-2026-05-01-013): livello categoria root
  # (es. "Elettronica"). Amazon.it mostra il rank principale nella
  # tabella tecnica del prodotto, riga "Posizione classifica
  # Bestseller". Il testo grezzo include "n. <numero> in
  # <categoria>" + eventuali sub-rank inline; `parse_bsr_text` parsa
  # solo il primo match (root).
  bsr_root:
    css:
      - "#productDetails_detailBullets_sections1 tr:has(th:-soup-contains('Bestseller')) td"
      - "#productDetails_detailBullets_sections1 .pdTab tr:nth-of-type(1) td"
      - "#detailBulletsWrapper_feature_div .a-list-item:has(span:-soup-contains('Bestseller'))"
    xpath:
      - "//tr[contains(., 'Bestseller')]/td"
      - "//li[contains(., 'classifica Bestseller')]"

  # BSR sub-rank (CHG-2026-05-01-013): livelli sotto-categoria
  # (es. "Cellulari", "Smartphone Samsung"). Amazon.it raggruppa i
  # sub-rank in `ul.zg_hrsr` come lista di `<li>`. Il selettore
  # ritorna 0..N stringhe (lista vuota = nessuna sotto-categoria
  # esposta dal layout corrente).
  bsr_sub:
    css:
      - "ul.zg_hrsr li"
      - "ul.a-unordered-list.zg_hrsr li"
    xpath:
      - "//ul[contains(@class, 'zg_hrsr')]/li"
