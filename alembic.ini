# Alembic config — ADR-0015.
# La URL effettiva del DB viene risolta in `migrations/env.py` da
# `TALOS_DB_URL` (env var) — questo file mantiene solo placeholder
# per evitare leak di credenziali nel repo.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = postgresql+psycopg://talos_app:CHANGE_ME@localhost:5432/talos

[post_write_hooks]
# Allinea le migration al quality gate del progetto (ADR-0014).
# Eseguito da `alembic revision` (opzionale: se ruff non è in PATH, hook salta).
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
